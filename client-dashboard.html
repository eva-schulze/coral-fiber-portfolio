<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Dashboard — Coral Fiber</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f5f7;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: 0.02em; }
    header span { font-size: 0.85rem; color: #a0aec0; }
    .tagline { font-size: 0.78rem; color: #718096; margin-top: 2px; }

    main { max-width: 1100px; margin: 40px auto; padding: 0 24px; }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #718096;
      margin-bottom: 20px;
    }

    /* ── My Actions Panel ── */
    .my-actions-panel {
      background: white;
      border-radius: 12px;
      padding: 24px 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 32px;
      border-left: 4px solid #1a1a2e;
    }
    .my-actions-panel .panel-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }
    .my-actions-panel .panel-subtitle {
      font-size: 0.78rem;
      color: #a0aec0;
      margin-bottom: 18px;
    }
    .my-action-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .my-action-row:last-child { border-bottom: none; }
    .my-action-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-critical { background: #e53e3e; }
    .dot-review   { background: #d69e2e; }
    .dot-stable   { background: #38a169; }

    .my-action-text { font-size: 0.88rem; color: #2d3748; flex: 1; }
    .my-action-client {
      font-size: 0.75rem;
      color: #718096;
      background: #f4f5f7;
      padding: 2px 8px;
      border-radius: 99px;
      white-space: nowrap;
    }
    .my-action-due {
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .due-critical { color: #c53030; }
    .due-review   { color: #b7791f; }
    .due-stable   { color: #38a169; }

    /* ── Summary Bar ── */
    .summary-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .summary-pill {
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .summary-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
    .pill-critical { background: #fff5f5; color: #c53030; }
    .pill-critical .dot { background: #e53e3e; }
    .pill-review   { background: #fffff0; color: #b7791f; }
    .pill-review   .dot { background: #d69e2e; }
    .pill-stable   { background: #f0fff4; color: #276749; }
    .pill-stable   .dot { background: #38a169; }

    /* ── Client Cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border-top: 4px solid #e2e8f0;
      transition: box-shadow 0.2s;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .card.critical { border-top-color: #e53e3e; }
    .card.urgent   { border-top-color: #dd6b20; }
    .card.review   { border-top-color: #d69e2e; }
    .card.stable   { border-top-color: #38a169; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    .client-name { font-size: 1.05rem; font-weight: 700; color: #1a1a2e; line-height: 1.3; }

    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
      margin-left: 12px;
    }
    .badge.critical { background: #fff5f5; color: #c53030; }
    .badge.urgent   { background: #fffaf0; color: #c05621; }
    .badge.review   { background: #fffff0; color: #b7791f; }
    .badge.stable   { background: #f0fff4; color: #276749; }

    .score-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .score-label { font-size: 0.78rem; color: #718096; white-space: nowrap; }
    .score-bar-track {
      flex: 1;
      height: 8px;
      background: #edf2f7;
      border-radius: 99px;
      overflow: hidden;
    }
    .score-bar-fill { height: 100%; border-radius: 99px; }
    .card.critical .score-bar-fill { background: #e53e3e; }
    .card.urgent   .score-bar-fill { background: #dd6b20; }
    .card.review   .score-bar-fill { background: #d69e2e; }
    .card.stable   .score-bar-fill { background: #38a169; }
    .score-number { font-size: 0.85rem; font-weight: 700; color: #2d3748; white-space: nowrap; }

    .subsection-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #a0aec0;
      margin-bottom: 10px;
    }

    .issues-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }
    .issues-list li {
      font-size: 0.85rem;
      color: #4a5568;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.4;
    }
    .issues-list li::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .card.critical .issues-list li::before { background: #e53e3e; }
    .card.urgent   .issues-list li::before { background: #dd6b20; }
    .card.review   .issues-list li::before { background: #d69e2e; }
    .card.stable   .issues-list li::before { background: #38a169; }
    .no-issues { font-size: 0.85rem; color: #68d391; font-style: italic; }

    /* ── Actions Table ── */
    .divider {
      border: none;
      border-top: 1px solid #edf2f7;
      margin: 16px 0;
    }

    .actions-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .action-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.82rem;
    }
    .action-text { flex: 1; color: #2d3748; line-height: 1.4; }
    .action-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      flex-shrink: 0;
    }
    .action-owner {
      font-size: 0.72rem;
      color: #718096;
      background: #f4f5f7;
      padding: 2px 7px;
      border-radius: 99px;
      white-space: nowrap;
    }
    .action-owner.mine {
      background: #ebf4ff;
      color: #2b6cb0;
      font-weight: 600;
    }
    .action-due {
      font-size: 0.72rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .card.critical .action-due { color: #c53030; }
    .card.review   .action-due { color: #b7791f; }
    .card.stable   .action-due { color: #38a169; }

    /* ── Error state ── */
    .load-error {
      background: white;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border-left: 4px solid #e53e3e;
      color: #c53030;
      font-size: 0.9rem;
      line-height: 1.7;
    }
    .load-error strong { display: block; margin-bottom: 8px; font-size: 1rem; }
    .load-error code {
      background: #fff5f5;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    footer {
      text-align: center;
      padding: 40px 24px 24px;
      font-size: 0.75rem;
      color: #a0aec0;
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>Coral Fiber</h1>
      <div class="tagline">We clear the water. You clean the world.</div>
    </div>
    <span>Client Dashboard — March 5, 2026</span>
  </header>

  <main>
    <div class="my-actions-panel">
      <div class="panel-title">My Actions</div>
      <div class="panel-subtitle">Filtered for: Customer Success</div>
      <div id="my-actions-list"></div>
    </div>

    <div id="summary-bar" class="summary-bar"></div>

    <div id="section-title" class="section-title"></div>

    <div id="cards" class="cards"></div>
  </main>

  <footer>
    Coral Fiber — Internal Use Only &nbsp;|&nbsp; eva-schulze.com
  </footer>

  <script>
    const MY_ROLE = 'Customer Success Lead';

    function sc(status) {
      return status.toLowerCase();
    }

    function renderMyActions(clients) {
      // Collect all Customer Success actions across clients, sorted by urgency
      const rows = [];
      for (const client of clients) {
        for (const action of client.actions) {
          if (action.owner === MY_ROLE) {
            rows.push({ ...action, clientName: client.name, clientStatus: client.status });
          }
        }
      }
      rows.sort((a, b) => a.due_days - b.due_days);

      document.getElementById('my-actions-list').innerHTML = rows.map(r => `
        <div class="my-action-row">
          <div class="my-action-dot dot-${sc(r.clientStatus)}"></div>
          <div class="my-action-text">${r.task}</div>
          <div class="my-action-client">${r.clientName}</div>
          <div class="my-action-due due-${sc(r.clientStatus)}">Due in ${r.due_days} days</div>
        </div>
      `).join('');
    }

    function renderSummaryBar(clients) {
      const counts = {};
      for (const client of clients) {
        counts[client.status] = (counts[client.status] || 0) + 1;
      }
      const order = ['Critical', 'Urgent', 'Review', 'Stable'];
      document.getElementById('summary-bar').innerHTML = order
        .filter(s => counts[s])
        .map(s => `
          <div class="summary-pill pill-${sc(s)}">
            <span class="dot"></span> ${counts[s]} ${s}
          </div>
        `).join('');
    }

    function renderCards(clients) {
      document.getElementById('section-title').textContent =
        `Active Clients — ${clients.length} organization${clients.length !== 1 ? 's' : ''}`;

      document.getElementById('cards').innerHTML = clients.map(client => {
        const pct = Math.round(client.score / client.score_max * 100);

        const issuesHTML = client.issues.length
          ? client.issues.map(i => `<li>${i}</li>`).join('')
          : `<li class="no-issues">No critical issues — operations on track.</li>`;

        const actionsHTML = client.actions.map(a => `
          <div class="action-row">
            <div class="action-text">${a.task}</div>
            <div class="action-meta">
              <span class="action-owner${a.owner === MY_ROLE ? ' mine' : ''}">${a.owner}</span>
              <span class="action-due">Due in ${a.due_days} days</span>
            </div>
          </div>
        `).join('');

        return `
          <div class="card ${sc(client.status)}">
            <div class="card-header">
              <div class="client-name">${client.name}</div>
              <span class="badge ${sc(client.status)}">${client.status}</span>
            </div>
            <div class="score-row">
              <span class="score-label">Health score</span>
              <div class="score-bar-track">
                <div class="score-bar-fill" style="width: ${pct}%"></div>
              </div>
              <span class="score-number">${client.score} / ${client.score_max}</span>
            </div>
            <div class="subsection-title">Issues requiring attention</div>
            <ul class="issues-list">${issuesHTML}</ul>
            <hr class="divider">
            <div class="subsection-title">Open Actions</div>
            <div class="actions-list">${actionsHTML}</div>
          </div>
        `;
      }).join('');
    }

    function renderError(message) {
      document.querySelector('main').innerHTML = `
        <div class="load-error">
          <strong>Could not load client data from clients.json</strong>
          ${message}
        </div>
      `;
    }

    fetch('clients.json')
      .then(r => {
        if (!r.ok) throw new Error(`Server returned ${r.status} — make sure clients.json is in the same folder.`);
        return r.json();
      })
      .then(data => {
        renderMyActions(data.clients);
        renderSummaryBar(data.clients);
        renderCards(data.clients);
      })
      .catch(err => {
        const isFileProtocol = location.protocol === 'file:';
        renderError(isFileProtocol
          ? `Chrome blocks <code>fetch()</code> for local files. Two options:<br>
             1. Open in <strong>Firefox</strong> — works directly from file://.<br>
             2. Use <strong>VS Code Live Server</strong> (right-click → Open with Live Server) to serve it locally in Chrome.`
          : err.message
        );
      });
  </script>

</body>
</html>
